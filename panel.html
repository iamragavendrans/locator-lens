<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><title>LocatorLens</title><link rel="stylesheet" href="panel.css"/></head>
<body>
<div id="app">
  <header class="hdr">
    <div class="hdr-brand">
      <svg class="hdr-logo" width="20" height="20" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="8" stroke="#818cf8" stroke-width="2"/>
        <line x1="11" y1="5" x2="11" y2="17" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="2 2"/>
        <line x1="5" y1="11" x2="17" y2="11" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="2 2"/>
        <circle cx="11" cy="11" r="2.5" fill="#6366f1"/>
        <line x1="17" y1="17" x2="22" y2="22" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span class="hdr-title">LocatorLens</span>
    </div>
    <div class="hdr-btns">
      <button id="btn-passive" class="pill" title="Auto-capture clicks on bound page">Passive</button>
      <button id="btn-lock" class="pill" title="Lock page interactions — prevents UI changes while inspecting" disabled>Lock</button>
      <button id="btn-stack" class="pill" title="Open Stack section">Stack <span id="stack-count">0</span></button>
      <button id="btn-pick" class="pill pill-primary" title="Pick an element — binds to current tab">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/><line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="1.5"/><line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.5"/></svg>
        +Pick
      </button>
    </div>
  </header>
  <div id="tab-bar" class="tab-bar" style="display:none">
    <span id="tab-url" class="tab-url"></span>
    <button id="btn-unbind" class="tab-unbind" title="Release page binding">x</button>
  </div>
  <section id="v-idle" class="v-state">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" opacity="0.25"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.5"/><line x1="17" y1="17" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    <p class="v-title">Ready to inspect</p>
    <p class="v-sub">Click <strong>+Pick</strong> to select, or enable <strong>Passive</strong> to capture clicks.</p>
  </section>
  <section id="v-picking" class="v-state" style="display:none">
    <div class="pick-ring"></div>
    <p class="v-title">Picking active...</p>
    <p class="v-sub">Click any element on the page. Press <kbd>Esc</kbd> to cancel.</p>
  </section>
  <section id="v-error" class="v-state" style="display:none">
    <p class="v-title v-err">Warning</p>
    <p id="err-msg" class="v-sub"></p>
  </section>
  <div id="v-results" class="results" style="display:none">
    <details id="sec-reference" class="sec" open><summary class="sec-hd">Reference</summary><div id="ref-grid" class="sec-bd ref-grid"></div></details>
    <details id="sec-properties" class="sec"><summary class="sec-hd">Properties</summary><div id="props-body" class="sec-bd"></div></details>
    <details id="sec-locators" class="sec" open>
      <summary class="sec-hd">Locators <span id="tier-pills" class="tier-pills"></span></summary>
      <div class="sec-bd loc-body">
        <div id="best-card" class="best-card" style="display:none"></div>
        <div id="tier-stable-hd" class="tier-hd tier-stable-hd" style="display:none"></div><div id="tier-stable"></div>
        <div id="tier-moderate-hd" class="tier-hd tier-moderate-hd" style="display:none"></div><div id="tier-moderate"></div>
        <div id="tier-fragile-hd" class="tier-hd tier-fragile-hd" style="display:none"></div><div id="tier-fragile"></div>
      </div>
    </details>
    <details id="sec-stack" class="sec">
      <summary class="sec-hd">Stack</summary>
      <div class="sec-bd">
        <div class="stack-toolbar"><button id="btn-add-stack" class="sm-btn">+ Add current</button><button id="btn-export-pom" class="sm-btn">Export POM</button><button id="btn-clear-stack" class="sm-btn">Clear</button></div>
        <div id="stack-list" class="stack-list"></div>
        <div id="pom-picker" class="pom-picker" style="display:none">
          <button class="pom-btn" data-fw="playwright">Playwright TS</button><button class="pom-btn" data-fw="selenium">Selenium Java</button>
          <button class="pom-btn" data-fw="cypress">Cypress JS</button><button class="pom-btn" data-fw="wdio">WebdriverIO</button>
          <button class="pom-btn" data-fw="puppeteer">Puppeteer</button><button class="pom-btn" data-fw="testcafe">TestCafe</button><button class="pom-btn" data-fw="raw">Raw JSON</button>
        </div>
      </div>
    </details>
    <details id="sec-validator" class="sec">
      <summary class="sec-hd">Live Validator</summary>
      <div class="sec-bd">
        <div class="val-row">
          <span id="val-type-badge" class="val-type-badge">--</span>
          <input id="val-input" class="val-input" placeholder="Enter CSS or XPath selector..."/>
          <button id="val-highlight" class="sm-btn" title="Highlight">Highlight</button>
          <button id="val-flash" class="sm-btn" title="Flash">Flash</button>
        </div>
        <div id="val-result" class="val-result"></div>
        <div id="val-preview" class="val-preview"></div>
      </div>
    </details>
  </div>
</div>
<div id="color-modal" class="color-modal" style="display:none">
  <div class="color-modal-backdrop"></div>
  <div class="color-modal-content">
    <div id="color-modal-swatch" class="color-modal-swatch"></div>
    <div id="color-modal-value" class="color-modal-value"></div>
    <button id="color-modal-copy" class="sm-btn">Copy</button>
    <button id="color-modal-close" class="color-modal-close">x</button>
  </div>
</div>
<script src="panel.js"></script>
</body>
</html>
