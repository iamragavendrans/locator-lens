<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>LocatorLens</title>
  <link rel="stylesheet" href="panel.css"/>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header class="hdr">
    <div class="hdr-brand">
      <svg class="hdr-logo" width="22" height="22" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="8" stroke="#818cf8" stroke-width="2"/>
        <line x1="11" y1="5" x2="11" y2="17" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="2 2"/>
        <line x1="5" y1="11" x2="17" y2="11" stroke="#818cf8" stroke-width="1.5" stroke-dasharray="2 2"/>
        <circle cx="11" cy="11" r="2.5" fill="#6366f1"/>
        <line x1="17" y1="17" x2="22" y2="22" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span class="hdr-title">LocatorLens</span>
      <span class="hdr-ver">v5</span>
    </div>
    <div class="hdr-controls">
      <button id="btn-passive" class="ctl-btn" title="Auto-capture every click">Passive</button>
      <button id="btn-lock" class="ctl-btn" title="Lock results — prevent updates" disabled>Lock</button>
      <button id="btn-pick" class="ctl-btn ctl-pick" title="Pick an element on the page">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.5"/><line x1="6" y1="1" x2="6" y2="11" stroke="currentColor" stroke-width="1.5"/><line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.5"/></svg>
        Pick
      </button>
    </div>
  </header>

  <!-- Idle state -->
  <section id="v-idle" class="view-state">
    <div class="state-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" opacity="0.3">
        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.5"/>
        <line x1="17" y1="17" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <p class="state-title">Ready to inspect</p>
    <p class="state-sub">Click <strong>Pick</strong> to select any element, or enable <strong>Passive</strong> to capture clicks automatically.</p>
  </section>

  <!-- Picking state -->
  <section id="v-picking" class="view-state" style="display:none">
    <div class="pick-ring"></div>
    <p class="state-title">Picking active…</p>
    <p class="state-sub">Click any element on the page.<br>Press <kbd>Esc</kbd> to cancel.</p>
  </section>

  <!-- Error state -->
  <section id="v-error" class="view-state" style="display:none">
    <p class="state-title err-title">⚠ Error</p>
    <p id="err-msg" class="state-sub"></p>
  </section>

  <!-- Results -->
  <div id="v-results" class="results-wrap" style="display:none">

    <!-- Lock banner -->
    <div id="lock-banner" class="lock-banner" style="display:none">
      <span>🔒 Results locked</span>
      <button id="btn-unlock" class="sm-btn">Unlock</button>
    </div>

    <!-- Element summary -->
    <details id="sec-props" class="sec" open>
      <summary class="sec-head">Properties</summary>
      <div id="props-body" class="sec-body"></div>
    </details>

    <!-- Best locator recommendation -->
    <div id="best-bar" class="best-bar" style="display:none">
      <span class="best-badge">★</span>
      <div class="best-info">
        <span id="best-type" class="best-type"></span>
        <code id="best-sel" class="best-sel"></code>
      </div>
      <button id="best-copy" class="sm-btn" title="Copy selector">Copy</button>
      <div class="best-fw-wrap">
        <button id="best-fw-btn" class="sm-btn" title="Copy formatted for…">For ▾</button>
        <div id="best-fw-menu" class="fw-menu" style="display:none"></div>
      </div>
    </div>

    <!-- Locators by tier -->
    <details id="sec-stable" class="sec" open>
      <summary class="sec-head tier-stable">Stable</summary>
      <div id="tier-stable" class="sec-body loc-list"></div>
    </details>

    <details id="sec-moderate" class="sec">
      <summary class="sec-head tier-moderate">Moderate</summary>
      <div id="tier-moderate" class="sec-body loc-list"></div>
    </details>

    <details id="sec-fragile" class="sec">
      <summary class="sec-head tier-fragile">Fragile</summary>
      <div id="tier-fragile" class="sec-body loc-list"></div>
    </details>

    <!-- Live Validator -->
    <details id="sec-validator" class="sec">
      <summary class="sec-head">Live Validator</summary>
      <div class="sec-body">
        <div class="val-row">
          <select id="val-type" class="val-select">
            <option value="css">CSS</option>
            <option value="xpath">XPath</option>
          </select>
          <input id="val-input" class="val-input" placeholder="Enter selector to test…"/>
          <button id="val-go" class="sm-btn">Test</button>
        </div>
        <div id="val-result" class="val-result"></div>
      </div>
    </details>

  </div>

</div>
<script src="panel.js"></script>
</body>
</html>
