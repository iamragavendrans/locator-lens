name: Build CRX
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: meta
        run: |
          BASE_VER=$(jq -r .version manifest.json)
          COMMIT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${BASE_VER}.${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=$(jq -r .name manifest.json)" >> "$GITHUB_OUTPUT"
      - name: Generate signing key
        run: openssl genrsa -out key.pem 2048
      - name: Build packages
        id: build
        run: |
          set -euo pipefail
          NAME="${{ steps.meta.outputs.name }}"
          VER="${{ steps.meta.outputs.version }}"
          ZIP="${NAME}-${VER}.zip"
          CRX="${NAME}-${VER}.crx"
          zip -r "$ZIP" manifest.json background.js content.js content.css \
            panel.html panel.css panel.js icons/ \
            -x '*.git*' 'key.pem' 'README.md' 'LICENSE' '.gitignore' '*.py' 'CONTRIBUTING.md'
          openssl rsa -in key.pem -pubout -outform DER -out pub.der 2>/dev/null
          openssl dgst -sha256 -sign key.pem -out sig.der "$ZIP"
          python3 build_crx3.py pub.der sig.der "$ZIP" "$CRX"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "crx=$CRX" >> "$GITHUB_OUTPUT"
          ls -lh "$ZIP" "$CRX"
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}
          path: |
            ${{ steps.build.outputs.zip }}
            ${{ steps.build.outputs.crx }}
      - name: Create Tag
        run: |
          TAG_NAME="v${{ steps.meta.outputs.version }}"
          git tag -d $TAG_NAME 2>/dev/null || true
          git tag $TAG_NAME
          git push origin $TAG_NAME
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.meta.outputs.version }}"
          name: "${{ steps.meta.outputs.name }} v${{ steps.meta.outputs.version }}"
          body: |
            ## Installation
            1. Download the `.zip` below → unzip → `chrome://extensions` → Developer mode → Load unpacked
            2. Or drag the `.crx` onto `chrome://extensions`
          files: |
            ${{ steps.build.outputs.zip }}
            ${{ steps.build.outputs.crx }}
      - name: Cleanup Old Releases
        run: |
          # Keep only the 2 most recent releases, delete older ones
          OLD_RELEASES=$(gh api repos/${{ github.repository }}/releases --paginate \
            -q '.[] | .id' | tail -n +3)
          for RELEASE_ID in $OLD_RELEASES; do
            if [ -n "$RELEASE_ID" ]; then
              echo "Deleting release $RELEASE_ID"
              gh api repos/${{ github.repository }}/releases/$RELEASE_ID -X DELETE
            fi
          done
      - name: Cleanup
        if: always()
        run: rm -f key.pem pub.der sig.der
