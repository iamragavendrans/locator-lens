name: Build extension package

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CHROME_EXTENSION_PRIVATE_KEY: ${{ secrets.CHROME_EXTENSION_PRIVATE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build extension ZIP
        run: |
          python - <<'PY'
          from pathlib import Path
          import zipfile

          files = [
              'manifest.json',
              'background.js',
              'content.js',
              'content.css',
              'panel.html',
              'panel.css',
              'panel.js',
              'README.md',
              'LICENSE',
              'icons/icon16.png',
              'icons/icon48.png',
              'icons/icon128.png',
          ]

          root = Path('.')
          build = root / 'dist'
          build.mkdir(exist_ok=True)
          zip_path = build / 'locatorlens.zip'
          with zipfile.ZipFile(zip_path, 'w', compression=zipfile.ZIP_DEFLATED) as zf:
              for rel in files:
                  path = root / rel
                  if not path.exists():
                      raise SystemExit(f'Missing required file: {rel}')
                  zf.write(path, rel)
          print(f'Wrote {zip_path}')
          PY

      - name: Build signed CRX
        if: env.CHROME_EXTENSION_PRIVATE_KEY != ''
        run: |
          mkdir -p dist/signing
          printf '%s' "$CHROME_EXTENSION_PRIVATE_KEY" > dist/signing/key.pem
          openssl rsa -in dist/signing/key.pem -pubout -outform DER -out dist/signing/public.der
          openssl dgst -sha256 -sign dist/signing/key.pem -out dist/signing/signature.der dist/locatorlens.zip
          python build_crx3.py dist/signing/public.der dist/signing/signature.der dist/locatorlens.zip dist/locatorlens.crx

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: locatorlens-build
          path: |
            dist/locatorlens.zip
            dist/locatorlens.crx
          if-no-files-found: warn

      - name: Publish release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/locatorlens.zip
            dist/locatorlens.crx
          generate_release_notes: true
